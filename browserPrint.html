      // =======================
      // 🔥 MAIN SVG GENERATOR
      // =======================
      function generateSVG(data) {
        const padding = DS.layout.padding;
        const maxWidth = width - padding * 2;

        let y = padding * 3;
        let height = y;

        const parts = [];

        function add(text) {
          parts.push(text);
        }

        // DATE
        const date = new Date().toLocaleDateString("en-GB", {
          day: "2-digit",
          month: "long",
          year: "numeric",
        });

        add(
          `<text x="${width / 2}" y="${y}" font-size="${DS.typography.h4}" text-anchor="middle">${date}</text>`,
        );
        y += DS.spacing.xxl;

        // CUSTOMER
        const customerLines = wrapText(
          `For ${data.customerName}`,
          DS.typography.h1,
          maxWidth,
        );
        customerLines.forEach((line) => {
          add(
            `<text x="${padding}" y="${y}" font-size="${DS.typography.h1}" font-weight="bold">${esc(line)}</text>`,
          );
          y += DS.typography.h1;
        });

        // ITEM
        const item = data.itemSize
          ? `${data.itemName} (${data.itemSize})`
          : data.itemName;
        const itemLines = wrapText(item, DS.typography.h2, maxWidth);
        itemLines.forEach((line) => {
          add(
            `<text x="${padding}" y="${y}" font-size="${DS.typography.h2}" font-weight="bold">${esc(line)}</text>`,
          );
          y += DS.typography.h2;
        });

        // MODIFIERS
        data.modifiers.forEach((m) => {
          const lines = wrapText(m, DS.typography.body, maxWidth);
          lines.forEach((line) => {
            add(
              `<text x="${padding}" y="${y}" font-size="${DS.typography.body}" font-style="italic">${esc(line)}</text>`,
            );
            y += DS.typography.body;
          });
        });

        y += DS.spacing.md;

        // NUTRITION TABLE
        const values = [
          { v: data.macros.cal, l: "Cals" },
          { v: data.macros.carbs + "g", l: "Carbs" },
          { v: data.macros.protein + "g", l: "Protein" },
          { v: data.macros.fat + "g", l: "Fat" },
        ];

        const colW = (width - padding * 2) / 4;

        values.forEach((item, i) => {
          const x = padding + colW * i + colW / 2;

          add(
            `<text x="${x}" y="${y}" font-size="${DS.typography.h3}" text-anchor="middle">${item.v}</text>`,
          );
          add(
            `<text x="${x}" y="${y + DS.typography.small}" font-size="${DS.typography.small}" text-anchor="middle">${item.l}</text>`,
          );

          // if (i > 0) {
          //   const lineX = padding + colW * i;
          //   add(`<line x1="${lineX}" y1="${y-20}" x2="${lineX}" y2="${y+60}" stroke="black" stroke-width="${DS.layout.strokeWidth}"/>`);
          // }
        });

        y += DS.spacing.xl;

        // FOOTER
        add(
          `<text x="${width / 2}" y="${y}" font-size="${DS.typography.caption}" text-anchor="middle">Made with love by</text>`,
        );
        y += DS.spacing.sm;

        const scaleLogo = DS.logo.maxWidth / DS.logo.originalWidth;
        const logoX = (width - DS.logo.maxWidth) / 2;

        add(
          `<g transform="translate(${logoX},${y}) scale(${scaleLogo})">${LOGO}</g>`,
        );

        y += DS.logo.originalHeight * scaleLogo;

        height = y + padding;

        return `
  <svg 
    width="${LABEL_WIDTH_MM}mm"
    height="${height / PX_PER_MM}mm"
    viewBox="0 0 ${width} ${height}"
    xmlns="http://www.w3.org/2000/svg"
  >
    <rect width="100%" height="100%" fill="white"/>
    ${parts.join("\n")}
  </svg>
  `;
      }

      // =======================
      // 🔥 RENDER
      // =======================
      document.getElementById("preview").innerHTML = generateSVG(data);

      function printSVG() {
        const svgMarkup = generateSVG(data);
        const printWindow = window.open("", "_blank", "noopener,noreferrer");

        if (!printWindow) {
          alert("Unable to open print window. Please allow pop-ups and try again.");
          return;
        }

        printWindow.document.open();
        printWindow.document.write(`
          <!doctype html>
          <html>
            <head>
              <meta charset="UTF-8" />
              <title>Print Label</title>
              <style>
                @page {
                  size: 29mm auto;
                  margin: 0;
                }

                html, body {
                  margin: 0;
                  padding: 0;
                  width: 29mm;
                }

                svg {
                  width: 29mm !important;
                  height: auto !important;
                  display: block;
                }
              </style>
            </head>
            <body>
              ${svgMarkup}
            </body>
          </html>
        `);
        printWindow.document.close();
        printWindow.focus();

        const onPrinted = () => {
          printWindow.removeEventListener("afterprint", onPrinted);
          printWindow.close();
        };

        printWindow.addEventListener("afterprint", onPrinted);

        setTimeout(() => {
          printWindow.print();
        }, 100);
      }

    </script>
  </body>
